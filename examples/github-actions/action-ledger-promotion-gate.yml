name: Flight Recorder Promotion Gate

on:
  workflow_dispatch:
  pull_request:

jobs:
  promotion-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flight Recorder
        run: python -m pip install hermes-flight-recorder

      - name: Build longitudinal action ledger
        run: |
          python -m flightrecorder action-ledger \
            --bundle runs/previous/evidence_bundle.json \
            --bundle runs/current/evidence_bundle.json \
            --out runs/action_ledger.json

      - name: Gate recurring repair pressure
        run: |
          python -m flightrecorder gate-action-ledger \
            --action-ledger runs/action_ledger.json \
            --policy examples/action_ledger_gate_policy.demo.json \
            --out runs/action_ledger_gate.json

          python -m flightrecorder validate \
            --action-ledger runs/action_ledger.json \
            --action-ledger-gate runs/action_ledger_gate.json \
            --strict

      - name: Require promotion recommendation
        run: |
          python -m flightrecorder gate-decision \
            --artifact runs/action_ledger_gate.json \
            --expect-recommendation promote_iteration \
            --expect-readiness ready \
            --require-passed \
            --out runs/promotion_decision.json

          python -m flightrecorder validate \
            --decision-gate runs/promotion_decision.json \
            --strict

      - name: Build promotion history
        run: |
          if [ -f runs/previous/promotion_decision.json ]; then
            python -m flightrecorder promotion-ledger \
              --decision-gate runs/previous/promotion_decision.json \
              --decision-gate runs/promotion_decision.json \
              --out runs/promotion_ledger.json
          else
            python -m flightrecorder promotion-ledger \
              --decision-gate runs/promotion_decision.json \
              --out runs/promotion_ledger.json
          fi

          python -m flightrecorder validate \
            --promotion-ledger runs/promotion_ledger.json \
            --strict

      - name: Gate promotion history
        run: |
          python -m flightrecorder gate-promotion-ledger \
            --promotion-ledger runs/promotion_ledger.json \
            --policy examples/promotion_ledger_gate_policy.demo.json \
            --out runs/promotion_ledger_gate.json

          python -m flightrecorder validate \
            --promotion-ledger-gate runs/promotion_ledger_gate.json \
            --strict

      - name: Archive promotion evidence
        run: |
          python -m flightrecorder promotion-archive \
            --promotion-ledger runs/promotion_ledger.json \
            --promotion-ledger-gate runs/promotion_ledger_gate.json \
            --decision-gate runs/promotion_decision.json \
            --out runs/promotion_archive \
            --require-self-contained \
            --force

          python -m flightrecorder validate \
            --promotion-archive runs/promotion_archive \
            --strict

      - name: Write promotion summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("runs/promotion_decision.json")
          if not path.exists():
              raise SystemExit(0)
          gate = json.loads(path.read_text(encoding="utf-8"))
          ledger_path = Path("runs/promotion_ledger.json")
          ledger = json.loads(ledger_path.read_text(encoding="utf-8")) if ledger_path.exists() else {}
          ledger_gate_path = Path("runs/promotion_ledger_gate.json")
          ledger_gate = json.loads(ledger_gate_path.read_text(encoding="utf-8")) if ledger_gate_path.exists() else {}
          archive_path = Path("runs/promotion_archive/promotion_archive.json")
          archive = json.loads(archive_path.read_text(encoding="utf-8")) if archive_path.exists() else {}
          metrics = ledger.get("metrics", {})
          source = gate.get("source_decision", {})
          source_artifact = gate.get("source_artifact", {})
          summary = [
              "## Flight Recorder Promotion Gate",
              "",
              f"- Recommendation: `{gate.get('recommendation')}`",
              f"- Source recommendation: `{source.get('recommendation')}`",
              f"- Source readiness: `{source.get('readiness')}`",
              f"- Source SHA-256: `{source_artifact.get('sha256')}`",
              f"- Failed checks: `{gate.get('failed_check_count')}`",
              f"- Promotion history decisions: `{metrics.get('decision_count')}`",
              f"- Consecutive blocks: `{metrics.get('consecutive_blocked_count')}`",
              f"- History gate: `{ledger_gate.get('recommendation') or ledger_gate.get('decision', {}).get('recommendation')}`",
              f"- Promotion archive self-contained: `{archive.get('self_contained')}`",
          ]
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text("\n".join(summary) + "\n", encoding="utf-8")
          PY
